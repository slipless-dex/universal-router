[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
evm_version = "cancun"
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/"
]

[fmt]
line_length = 110
tab_width = 4
quote_style = "double"
