name: ci
on: { push: { branches: [main] }, pull_request: }
jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1
        with: { version: nightly }
      - run: forge build --sizes
      - run: forge test -vvv
